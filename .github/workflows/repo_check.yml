name: Repo Check

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  repo-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List repository structure
        run: |
          echo "Repository structure:"
          ls -R

      - name: Verify important files exist
        run: |
          test -f README.md
          test -f databricks.yml
          test -f config/project_config.yml
          test -d docs
          test -d notebooks
          test -d sample_data
          test -d sql
          test -d src
